name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: leisimples
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d leisimples"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            mobile/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend
        run: npm ci --prefix backend

      - name: Install frontend
        run: npm ci --prefix frontend

      - name: Install mobile
        run: npm ci --prefix mobile

      - name: Install IA service
        run: pip install -r ia-service/requirements.txt

      - name: Backend env
        run: cp backend/.env.example backend/.env

      - name: Backend migrations
        run: npm --prefix backend run db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/leisimples

      - name: Backend lint
        run: npm --prefix backend run lint

      - name: Backend tests
        run: npm --prefix backend test

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Mobile lint
        run: npm --prefix mobile run lint

      - name: IA compile
        run: python -m py_compile ia-service/app.py
